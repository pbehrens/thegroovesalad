<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Groove Salad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a class="logo" href="/">
      <span class="logo-text">The Groove Salad</span>
    </a>
    <nav>

  </header>

  <main class="home-content">
    <div class="dog-photo">
      <img src="abby.jpg" alt="Abby" />

    <div class="home-projects">
      <a href="/beagleprep/" class="project-card">
        <div class="project-icon">🐾</div>
        <div>
          <h2>BeaglePrep</h2>
          <p>Prepper inventory app for Android</p>
        </div>

    </div>

  <footer>
    <p>&copy; <span id="year"></span> The Groove Salad. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</html>
